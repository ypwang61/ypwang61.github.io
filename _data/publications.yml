# All publications & projects, newest first (single source of truth).
# - pub.html (Publications & Projects) renders every entry in this order.
# Adding a paper/project = append one entry here.
#
# Fields:
#   title, authors, venue   : required (HTML allowed, e.g. <b>, &dagger;, <font>)
#   note                    : optional extra line above venue (HTML allowed)
#   tldr                    : optional one-line description shown under the title
#   bibtex                  : optional; rendered as a collapsible block (from arxiv.org/bibtex/<id>)
#   boxed                   : optional; highlight card background in pub.html
#   links                   : ordered list of { name, url, stars? }  (stars: N = show a live star count; N is the fallback if GitHub API is unreachable)
#   group / featured / img  : optional legacy fields (unused now the home page has no research grid)

- title: "ScaleAutoResearch: Scaling Automated Research for Scientific Discovery"
